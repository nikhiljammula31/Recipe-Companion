<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAR1_-3ZTzIoLBnpQCST5_01XH8ef6_YAE",
  authDomain: "recipefinder-67c3b.firebaseapp.com",
  projectId: "recipefinder-67c3b",
  storageBucket: "recipefinder-67c3b.firebasestorage.app",
  messagingSenderId: "1004341147480",
  appId: "1:1004341147480:web:71e531894fce53c998172d",
  measurementId: "G-924DZ6MGFX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Protect page
onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = "login.html";
});

window.goProfile = function() {
    window.location.href = "profile.html";
};

window.searchRecipe = function() {
    const dish = document.getElementById("dishName").value.trim();
    if (dish) fetchRecipe(dish);
};

window.fetchRecipe = async function(dish) {
    const resultDiv = document.getElementById("result");

    const q = query(collection(db, "recipes"), where("name", "==", dish));
    const snapshot = await getDocs(q);

    if (snapshot.empty) {
        resultDiv.innerHTML = "❌ Recipe not found";
        return;
    }

    snapshot.forEach(doc => {
        const r = doc.data();
        resultDiv.innerHTML = `
            <h3>${r.name}</h3>
            <p><strong>Ingredients:</strong> ${r.ingredients}</p>
            <p><strong>Estimated Time:</strong> ${r.time} minutes</p>
            <p><strong>Preparation Steps:</strong></p>
            <p>${r.steps.replace(/\n/g, "<br>")}</p>
        `;
    });
};
</script>
